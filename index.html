<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>משחק הכנה למבחן באנגלית - שכבה ד'</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f8ff; text-align: center; }
        .container { max-width: 600px; margin: 50px auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #2e8b57; }
        .word-box { font-size: 32px; font-weight: bold; margin: 20px; color: #333; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 15px; font-size: 18px; cursor: pointer; border: none; border-radius: 8px; background-color: #add8e6; transition: 0.3s; }
        button:hover { background-color: #87ceeb; }
        .score { font-size: 20px; margin-top: 20px; color: #555; }
        #message { height: 30px; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Jet 2 - Unit 2 Game</h1>
    <p>בחרו את הפירוש הנכון למילה:</p>
    <div id="word-display" class="word-box">---</div>
    <div class="options" id="options-container"></div>
    <div id="message"></div>
    <div class="score">ניקוד: <span id="score-val">0</span></div>
</div>

<script>
    const vocabulary = [
        { eng: "Eyes", heb: "עיניים" }, { eng: "Mouth", heb: "פה" },
        { eng: "Cold", heb: "קר" }, { eng: "Coat", heb: "מעיל" },
        { eng: "Boots", heb: "מגפיים" }, { eng: "Wear", heb: "ללבוש" },
        { eng: "Warm", heb: "חם" }, { eng: "Ice cream", heb: "גלידה" },
        { eng: "Store", heb: "חנות" }, { eng: "Sunny", heb: "שמשי" },
        { eng: "Basketball", heb: "כדורסל" }, { eng: "Climb", heb: "לטפס" },
        { eng: "Clouds", heb: "עננים" }, { eng: "Sky", heb: "שמיים" },
        { eng: "Funny", heb: "מצחיק" }
    ];

    let currentWord = {};
    let score = 0;

    function nextQuestion() {
        const randomIndex = Math.floor(Math.random() * vocabulary.length);
        currentWord = vocabulary[randomIndex];
        document.getElementById('word-display').innerText = currentWord.eng;
        document.getElementById('message').innerText = "";
        
        let choices = [currentWord.heb];
        while(choices.length < 4) {
            let randomHeb = vocabulary[Math.floor(Math.random() * vocabulary.length)].heb;
            if(!choices.includes(randomHeb)) choices.push(randomHeb);
        }
        choices.sort(() => Math.random() - 0.5);

        const container = document.getElementById('options-container');
        container.innerHTML = '';
        choices.forEach(choice => {
            const btn = document.createElement('button');
            btn.innerText = choice;
            btn.onclick = () => checkAnswer(choice);
            container.appendChild(btn);
        });
    }

    function checkAnswer(choice) {
        if(choice === currentWord.heb) {
            score += 10;
            document.getElementById('message').style.color = "green";
            document.getElementById('message').innerText = "כל הכבוד! נכון מאוד!";
            document.getElementById('score-val').innerText = score;
            setTimeout(nextQuestion, 1000);
        } else {
            document.getElementById('message').style.color = "red";
            document.getElementById('message').innerText = "נסו שוב...";
        }
    }

    nextQuestion();
</script>
</body>
</html>
