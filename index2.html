<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Jet 2 - Focus Practice</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #fff9e6; text-align: center; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); border: 3px solid #ffcc00; }
        h1 { color: #d35400; font-size: 28px; }
        .task-box { background: #fdf2e9; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .word-display { font-size: 45px; font-weight: bold; letter-spacing: 5px; color: #2e4053; margin: 15px 0; }
        .instruction { font-size: 20px; color: #7f8c8d; margin-bottom: 10px; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button { padding: 15px; font-size: 20px; cursor: pointer; border: 2px solid #e67e22; border-radius: 12px; background: white; transition: 0.2s; font-weight: bold; }
        button:hover { background: #e67e22; color: white; }
        .progress { margin-top: 20px; font-size: 16px; color: #95a5a6; }
        #feedback { height: 30px; font-weight: bold; margin: 10px; }
        textarea { width: 100%; height: 50px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>אימון ממוקד - Unit 2</h1>
    <div id="game-content">
        <div class="task-box">
            <div id="instruction" class="instruction">איזו אות חסרה?</div>
            <div id="word-display" class="word-display">---</div>
        </div>
        <div class="options" id="options-container"></div>
        <div id="feedback"></div>
    </div>
    
    <div class="progress">שאלה <span id="q-num">1</span> מתוך 10</div>
    <button id="log-btn" style="display:none; background:#27ae60; color:white; width:100%;" onclick="exportResults()">הפק דוח חדש</button>
    <textarea id="log-out" readonly></textarea>
</div>

<script>
    // רשימת שאלות ממוקדת על בסיס הטעויות
    const specialTasks = [
        { type: "spell", word: "C_AT", missing: "O", full: "COAT", heb: "מעיל" },
        { type: "spell", word: "E_ES", missing: "Y", full: "EYES", heb: "עיניים" },
        { type: "spell", word: "S_NNY", missing: "U", full: "SUNNY", heb: "שמשי" },
        { type: "spell", word: "CL_UD", missing: "O", full: "CLOUD", heb: "ענן" },
        { type: "spell", word: "M_UTH", missing: "O", full: "MOUTH", heb: "פה" },
        { type: "translate", word: "FUNNY", correct: "מצחיק", wrong: "לצחוק", full: "FUNNY" },
        { type: "translate", word: "NEAR", correct: "קרוב ל...", wrong: "מתנה", full: "NEAR" },
        { type: "translate", word: "STORE", correct: "חנות", wrong: "סיפור", full: "STORE" },
        { type: "spell", word: "B_OTS", missing: "O", full: "BOOTS", heb: "מגפיים" },
        { type: "translate", word: "GOOD FOR YOU", correct: "טוב לך / כל הכבוד", wrong: "בוקר טוב", full: "GOOD FOR YOU" }
    ];

    let currentIdx = 0;
    let history = [];

    function loadQuestion() {
        if (currentIdx >= specialTasks.length) {
            document.getElementById('game-content').innerHTML = "<h2>סיימנו את האימון הממוקד! 🥳</h2><p>עברת על כל המילים המאתגרות.</p>";
            document.getElementById('log-btn').style.display = "block";
            return;
        }

        const task = specialTasks[currentIdx];
        const display = document.getElementById('word-display');
        const instruction = document.getElementById('instruction');
        const container = document.getElementById('options-container');
        const feedback = document.getElementById('feedback');
        
        container.innerHTML = '';
        feedback.innerText = '';
        document.getElementById('q-num').innerText = currentIdx + 1;

        if (task.type === "spell") {
            instruction.innerText = "איזו אות חסרה במילה: " + task.heb + "?";
            display.innerText = task.word;
            let options = [task.missing, "A", "E", "I"].filter((v, i, a) => a.indexOf(v) === i);
            options = options.slice(0, 3);
            if (!options.includes(task.missing)) options[0] = task.missing;
            
            options.sort().forEach(opt => {
                const btn = document.createElement('button');
                btn.innerText = opt;
                btn.onclick = () => check(opt === task.missing, task.full);
                container.appendChild(btn);
            });
        } else {
            instruction.innerText = "מה הפירוש הנכון למילה?";
            display.innerText = task.word;
            let options = [task.correct, task.wrong].sort(() => Math.random() - 0.5);
            
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.innerText = opt;
                btn.onclick = () => check(opt === task.correct, task.word);
                container.appendChild(btn);
            });
        }
    }

    function check(isCorrect, wordName) {
        history.push({ word: wordName, success: isCorrect });
        const fb = document.getElementById('feedback');
        if (isCorrect) {
            fb.innerText = "מצוין!";
            fb.style.color = "green";
            currentIdx++;
            setTimeout(loadQuestion, 1000);
        } else {
            fb.innerText = "נסי שוב, את יכולה!";
            fb.style.color = "red";
        }
    }

    function exportResults() {
        const log = btoa(JSON.stringify({date: "FocusSession", results: history}));
        const out = document.getElementById('log-out');
        out.value = log;
        out.style.display = "block";
        out.select();
    }

    loadQuestion();
</script>
</body>
</html>
