<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Jet 2 - Game with Feedback</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; text-align: center; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .word-box { font-size: 40px; margin: 20px; color: #2c3e50; font-weight: bold; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button { padding: 15px; font-size: 18px; cursor: pointer; border: 2px solid #3498db; border-radius: 10px; background: white; transition: 0.2s; }
        button:hover { background: #3498db; color: white; }
        .stats { margin-top: 30px; padding-top: 20px; border-top: 2px solid #eee; }
        #log-output { width: 100%; height: 60px; margin-top: 10px; display: none; font-family: monospace; }
        .correct { background-color: #2ecc71 !important; color: white; }
        .wrong { background-color: #e74c3c !important; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1>אנגלית Unit 2 - אימון למבחן</h1>
    <div id="game-area">
        <div id="word-display" class="word-box">---</div>
        <div class="options" id="options-container"></div>
        <p id="message"></p>
    </div>

    <div class="stats">
        <p>שאלות שנענו: <span id="count-val">0</span> / 10</p>
        <button id="finish-btn" onclick="generateLog()" style="display:none; background:#9b59b6; color:white;">סיים משחק והפק דוח</button>
        <div id="log-section">
            <p id="log-msg" style="display:none;">העתיקו את הקוד הבא ושלחו אותו לבדיקה:</p>
            <textarea id="log-output" readonly></textarea>
        </div>
    </div>
</div>

<script>
    const vocabulary = [
        { eng: "Eyes", heb: "עיניים" }, { eng: "Mouth", heb: "פה" },
        { eng: "Cold", heb: "קר" }, { eng: "Coat", heb: "מעיל" },
        { eng: "Boots", heb: "מגפיים" }, { eng: "Wear", heb: "ללבוש" },
        { eng: "Warm", heb: "חם" }, { eng: "Ice cream", heb: "גלידה" },
        { eng: "Store", heb: "חנות" }, { eng: "Sunny", heb: "שמשי" },
        { eng: "Basketball", heb: "כדורסל" }, { eng: "Climb", heb: "לטפס" },
        { eng: "Clouds", heb: "עננים" }, { eng: "Sky", heb: "שמיים" },
        { eng: "Reading a book", heb: "לקרוא ספר" }
    ];

    let currentWord = {};
    let questionCount = 0;
    let history = [];

    function nextQuestion() {
        if (questionCount >= 10) {
            document.getElementById('game-area').innerHTML = "<h2>המשחק הסתיים! כל הכבוד!</h2>";
            document.getElementById('finish-btn').style.display = "inline-block";
            return;
        }

        const randomIndex = Math.floor(Math.random() * vocabulary.length);
        currentWord = vocabulary[randomIndex];
        document.getElementById('word-display').innerText = currentWord.eng;
        
        let choices = [currentWord.heb];
        while(choices.length < 4) {
            let randomHeb = vocabulary[Math.floor(Math.random() * vocabulary.length)].heb;
            if(!choices.includes(randomHeb)) choices.push(randomHeb);
        }
        choices.sort(() => Math.random() - 0.5);

        const container = document.getElementById('options-container');
        container.innerHTML = '';
        choices.forEach(choice => {
            const btn = document.createElement('button');
            btn.innerText = choice;
            btn.onclick = (e) => checkAnswer(choice, e.target);
            container.appendChild(btn);
        });
    }

    function checkAnswer(choice, btnElement) {
        const isCorrect = (choice === currentWord.heb);
        history.push({ word: currentWord.eng, success: isCorrect });
        
        if(isCorrect) {
            btnElement.classList.add('correct');
            questionCount++;
            document.getElementById('count-val').innerText = questionCount;
            setTimeout(nextQuestion, 800);
        } else {
            btnElement.classList.add('wrong');
            btnElement.disabled = true;
        }
    }

    function generateLog() {
        const logData = {
            date: new Date().toLocaleDateString(),
            results: history,
            total: history.length
        };
        const encodedLog = btoa(JSON.stringify(logData)); // קידוד קטן ליופי
        const logBox = document.getElementById('log-output');
        logBox.value = encodedLog;
        logBox.style.display = "block";
        document.getElementById('log-msg').style.display = "block";
        document.getElementById('finish-btn').innerText = "קוד הופק!";
    }

    nextQuestion();
</script>
</body>
</html>
